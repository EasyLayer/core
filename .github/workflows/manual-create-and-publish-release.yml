name: 'Create & Publish Release'

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  discover_components:
    name: Discover component packages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    outputs:
      components_matrix: ${{ steps.discover.outputs.components_matrix }}
      native_matrix: ${{ steps.discover.outputs.native_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover packages/components workspaces
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' > /tmp/components-matrices.env
          const fs = require('fs');
          const path = require('path');

          const componentsRoot = path.join(process.cwd(), 'packages', 'components');
          const nativeTargets = [
            { target: 'darwin-arm64', runner: 'macos-14' },
            { target: 'darwin-x64', runner: 'macos-15-intel' },
            { target: 'linux-x64-gnu', runner: 'ubuntu-latest' },
            { target: 'linux-arm64-gnu', runner: 'ubuntu-24.04-arm' },
            { target: 'win32-x64-msvc', runner: 'windows-latest' },
          ];

          const components = fs.existsSync(componentsRoot)
            ? fs.readdirSync(componentsRoot, { withFileTypes: true })
                .filter((entry) => entry.isDirectory())
                .map((entry) => {
                  const packagePath = path.join(componentsRoot, entry.name);
                  const packageJsonPath = path.join(packagePath, 'package.json');

                  if (!fs.existsSync(packageJsonPath)) {
                    return undefined;
                  }

                  const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));

                  if (packageJson.private === true) {
                    return undefined;
                  }

                  const scripts = packageJson.scripts || {};
                  const hasNativeBuild = typeof scripts['build:native'] === 'string';

                  return {
                    dir: entry.name,
                    name: packageJson.name,
                    path: `packages/components/${entry.name}`,
                    has_native: hasNativeBuild,
                  };
                })
                .filter(Boolean)
            : [];

          if (components.length === 0) {
            throw new Error('No public component packages were found under packages/components/*');
          }

          const nativeMatrix = [];
          for (const component of components) {
            if (!component.has_native) {
              continue;
            }

            for (const target of nativeTargets) {
              nativeMatrix.push({ ...component, ...target, skip: false });
            }
          }

          const nativeMatrixWithNoop = nativeMatrix.length > 0
            ? nativeMatrix
            : [{ dir: 'none', name: 'none', path: 'none', target: 'none', runner: 'ubuntu-latest', has_native: false, skip: true }];

          console.log(`components_matrix=${JSON.stringify({ include: components })}`);
          console.log(`native_matrix=${JSON.stringify({ include: nativeMatrixWithNoop })}`);
          NODE

          cat /tmp/components-matrices.env >> "$GITHUB_OUTPUT"
          cat /tmp/components-matrices.env

  build_common:
    name: Build @easylayer/common
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies in current repository
        uses: ./.github/actions/yarn-nm-install

      - name: Build common package
        shell: bash
        run: |
          set -euo pipefail
          yarn workspace @easylayer/common clear:dist
          yarn workspace @easylayer/common build
          tar -czf common-build.tar.gz \
            packages/common/index.js \
            packages/common/index.mjs \
            packages/common/index.d.ts \
            packages/common/package.json \
            packages/common/LICENSE \
            packages/common/*/dist

      - name: Upload common build artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-build-common
          path: common-build.tar.gz
          if-no-files-found: error

  build_components_js:
    name: Build component JS (${{ matrix.name }})
    needs: discover_components
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover_components.outputs.components_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies in current repository
        uses: ./.github/actions/yarn-nm-install

      - name: Build component package
        shell: bash
        run: |
          set -euo pipefail
          yarn workspace '${{ matrix.name }}' clear:dist

          if [ '${{ matrix.has_native }}' = 'true' ]; then
            if ! node -e "const pkg = require('./${{ matrix.path }}/package.json'); process.exit(pkg.scripts && pkg.scripts['build:js'] ? 0 : 1);"; then
              echo "❌ ${{ matrix.name }} has build:native but does not define build:js."
              echo "Native-enabled packages must build JS separately before native artifacts are restored."
              exit 1
            fi

            yarn workspace '${{ matrix.name }}' build:js
          else
            yarn workspace '${{ matrix.name }}' build
          fi

          tar -czf component-${{ matrix.dir }}-js-build.tar.gz \
            '${{ matrix.path }}/package.json' \
            '${{ matrix.path }}/LICENSE' \
            '${{ matrix.path }}/dist'

      - name: Upload component JS artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-build-component-${{ matrix.dir }}-js
          path: component-${{ matrix.dir }}-js-build.tar.gz
          if-no-files-found: error

  build_components_native:
    name: Build component native (${{ matrix.name }} / ${{ matrix.target }})
    needs: discover_components
    runs-on: ${{ matrix.runner }}
    if: github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover_components.outputs.native_matrix) }}
    steps:
      - name: Skip native build when no native components exist
        if: ${{ matrix.skip == true }}
        shell: bash
        run: echo 'No native component packages discovered.'

      - name: Checkout repository
        if: ${{ matrix.skip != true }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ matrix.skip != true }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        if: ${{ matrix.skip != true }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies in current repository
        if: ${{ matrix.skip != true }}
        uses: ./.github/actions/yarn-nm-install

      - name: Build native binding
        if: ${{ matrix.skip != true }}
        shell: bash
        run: |
          set -euo pipefail
          NATIVE_TARGET='${{ matrix.target }}' \
          NATIVE_BUILD_REQUIRED=1 \
          yarn workspace '${{ matrix.name }}' build:native

          tar -czf component-${{ matrix.dir }}-native-${{ matrix.target }}.tar.gz \
            '${{ matrix.path }}/dist/native'

      - name: Upload native artifact
        if: ${{ matrix.skip != true }}
        uses: actions/upload-artifact@v4
        with:
          name: package-build-component-${{ matrix.dir }}-native-${{ matrix.target }}
          path: component-${{ matrix.dir }}-native-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release packages
    needs:
      - build_common
      - build_components_js
      - build_components_native
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies in current repository
        uses: ./.github/actions/yarn-nm-install

      - name: Download built package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-build-*
          path: .release-artifacts
          merge-multiple: true

      - name: Restore built package artifacts
        shell: bash
        run: |
          set -euo pipefail
          find .release-artifacts -name '*.tar.gz' -print -exec tar -xzf {} -C . \;

      - name: Get Version from lerna.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Current version: $VERSION"

      - name: Create Git Tag if not exists
        run: |
          TAG="v${{ env.VERSION }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping tag creation."
          else
            echo "Creating a new tag $TAG."
            git tag "$TAG"
            git push origin "$TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Release Notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          VERSION="${{ env.VERSION }}"
          echo "Looking for changelog section for version: $VERSION"

          escape_regex() {
            printf '%s' "$1" | sed -e 's/[]\/$*.^|[]/\\&/g' -e 's/(/\\(/g' -e 's/)/\\)/g'
          }

          VER_ESC="$(escape_regex "$VERSION")"

          # Generic semver (incl. prerelease/build)
          VER_ANY='[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.+-]+)?'

          # Headers we support:
          # - ## 1.2.3 (date)
          # - ## <small>1.2.3 (date)</small>
          # - # [1.2.3](link) (date)  /  # [1.2.3] (date)
          # - ## [1.2.3] (date)
          HEADER_FOR_VERSION="^#{1,3}[[:space:]]*(<small>)?[[:space:]]*(\\[${VER_ESC}\\](\\([^)]*\\))?|${VER_ESC})([[:space:]]*</small>)?[[:space:]]*\\("
          HEADER_FOR_ANY="^#{1,3}[[:space:]]*(<small>)?[[:space:]]*(\\[${VER_ANY}\\](\\([^)]*\\))?|${VER_ANY})([[:space:]]*</small>)?[[:space:]]*\\("

          if ! grep -Eq "$HEADER_FOR_VERSION" CHANGELOG.md; then
            echo "❌ Could not find changelog section for version ${VERSION}"
            echo "Available changelog-like sections (top 10):"
            grep -En "$HEADER_FOR_ANY" CHANGELOG.md | head -10 || true
            exit 1
          fi

          START_LINE="$(grep -nE "$HEADER_FOR_VERSION" CHANGELOG.md | head -1 | cut -d: -f1)"
          echo "Found header at line: $START_LINE"

          NEXT_REL="$(tail -n +"$((START_LINE+1))" CHANGELOG.md | grep -nE "$HEADER_FOR_ANY" | head -1 | cut -d: -f1 || true)"
          if [ -n "$NEXT_REL" ]; then
            END_LINE="$((START_LINE + NEXT_REL - 2))"
          else
            END_LINE="$(wc -l < CHANGELOG.md)"
          fi

          NOTES_RAW="$(sed -n "$((START_LINE+1))","$END_LINE"p CHANGELOG.md)"
          NOTES="$(printf '%s' "$NOTES_RAW" | sed -e 's/^[[:space:]]*$//g' | grep -Ev '^[[:space:]]*$' || true)"

          # If notes are empty, try to auto-generate from git log using compare URL or previous tag
          if [ -z "${NOTES}" ]; then
            echo "No explicit notes in CHANGELOG for ${VERSION}. Falling back to git log."

            HEADER_LINE="$(sed -n "${START_LINE}p" CHANGELOG.md)"
            COMPARE_URL="$(printf '%s\n' "$HEADER_LINE" | sed -nE 's/.*\]\(([^)]*)\).*/\1/p' || true)"

            PREV_TAG=""
            CUR_TAG="v${VERSION}"

            if [ -n "$COMPARE_URL" ]; then
              PREV_TAG="$(printf '%s' "$COMPARE_URL" | sed -nE 's#.*/compare/(.*)\.\.\.(.*)#\1#p' || true)"
              CUR_FROM_URL="$(printf '%s' "$COMPARE_URL" | sed -nE 's#.*/compare/(.*)\.\.\.(.*)#\2#p' || true)"
              if [ -n "$CUR_FROM_URL" ]; then CUR_TAG="$CUR_FROM_URL"; fi
            fi

            if [ -z "$PREV_TAG" ]; then
              git fetch --tags --force >/dev/null 2>&1 || true
              # Take the previous tag by semver order (second line)
              PREV_TAG="$(git tag --list 'v*' --sort=-v:refname | sed -n '2p' || true)"
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "Using range: ${PREV_TAG}..${CUR_TAG}"
              GEN_NOTES="$(git log --no-merges --pretty=format:'* %s (%h)' "${PREV_TAG}..${CUR_TAG}" || true)"
              if [ -n "$GEN_NOTES" ]; then
                NOTES="$GEN_NOTES"
              fi
            fi

            if [ -z "${NOTES}" ]; then
              if [ -n "$COMPARE_URL" ]; then
                NOTES="No explicit notes. See diff: ${COMPARE_URL}"
              else
                NOTES="No explicit notes."
              fi
            fi
          fi

          echo "✅ Release notes will be used:"
          echo "$NOTES" | head -20

          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Release Packages
        id: publish_release_packages
        run: |
          set -euo pipefail
          echo "Publishing packages to NPM..."
          bash ./scripts/publish-release.sh
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'  # Disable HUSKY hooks during CI
      
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "v${{ env.VERSION }}"
          release_name: "v${{ env.VERSION }} (Release)"
          draft: false
          prerelease: false
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
